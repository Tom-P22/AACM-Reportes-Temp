spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
      dialect: org.hibernate.dialect.MySQLDialect
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true
  sql:
    init:
      mode: always

jwt:
  secret: ClaveUltraSecretaEInviolableParaLaMunicipalidad2026!
  issuer: ms-auth

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
  openapi:
    servers:
      - url: http://localhost:8080
        description: API Gateway (Entorno Local)
    # Agregamos la definición global del esquema de seguridad para el candado de autenticación
    components:
      security-schemes:
        bearerAuth:
          type: http
          scheme: bearer
          bearerFormat: JWT